<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcMemoJournal • Your USDC Payment Journal on Arc</title>
  </head>
  <body class="bg-zinc-950 text-white">
    <div class="max-w-4xl mx-auto px-6 py-10">
      
      <!-- Header -->
      <div class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-3">
          <img src="/logo.png" alt="ArcMemoJournal Logo" class="w-11 h-11">
          <h1 class="text-4xl font-bold tracking-tight">ArcMemoJournal</h1>
        </div>
        <div class="flex items-center gap-3">
          <button id="calendarBtn"
            class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm flex items-center gap-2">
            📅 Calendar
          </button>
          <button id="connectBtn"
            class="px-6 py-3 bg-white text-black font-medium rounded-2xl hover:bg-zinc-200 transition">
            Connect Wallet
          </button>
        </div>
      </div>

      <!-- Wallet Status -->
      <div id="walletStatus" class="mb-2 text-sm text-zinc-400"></div>

      <!-- Send Form -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-10">
        <h2 class="text-2xl font-semibold mb-6">Send USDC with Memo</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="text-sm text-zinc-400">Recipient Address</label>
              <button id="chooseContactBtn" 
                class="text-xs px-3 py-1 bg-zinc-700 hover:bg-zinc-600 rounded-lg">
                Choose from contacts
              </button>
            </div>
            <input id="recipient" type="text" placeholder="0x..."
              class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">Amount (USDC)</label>
            <input id="amount" type="number" value="1" step="0.01"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-sm text-zinc-400 mb-2">Memo / Note</label>
          <textarea id="memo" rows="3" placeholder="e.g. Test payment, Thanks for help..."
            class="w-full bg-zinc-950 border border-zinc-700 rounded-3xl px-4 py-3 text-sm resize-y"></textarea>
        </div>

        <div class="mt-4">
          <label class="block text-sm text-zinc-400 mb-2">Category</label>
          <select id="category" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
            <option value="Payment">Payment</option>
            <option value="Gift">Gift</option>
            <option value="Work">Work</option>
            <option value="Test">Test</option>
            <option value="Other" selected>Other</option>
          </select>
        </div>

        <button id="sendBtn"
          class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 transition text-black font-semibold py-4 rounded-2xl text-lg">
          Send with Memo
        </button>
      </div>

      <!-- Contacts Section -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-10">
        <h2 class="text-2xl font-semibold mb-6">Contacts</h2>
        
        <div class="flex gap-3 mb-4">
          <input id="contactName" type="text" placeholder="Name" 
            class="flex-1 bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
          <input id="contactAddress" type="text" placeholder="0x..." 
            class="flex-1 bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
          <button id="addContactBtn"
            class="px-6 bg-emerald-500 hover:bg-emerald-600 text-black font-medium rounded-2xl">
            Add
          </button>
        </div>

        <div id="contactsList" class="space-y-2"></div>
      </div>

      <!-- History -->
      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-2xl font-semibold">My Sent Payments</h2>
          <div class="flex gap-2 items-center">
            <input id="searchInput" type="text" placeholder="Search..." 
              class="bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2 text-sm w-64">
            <button id="exportBtn"
              class="text-sm px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded-xl text-zinc-300">
              Export CSV
            </button>
            <button id="clearHistoryBtn"
              class="text-sm px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-zinc-400">
              Clear History
            </button>
          </div>
        </div>
        
        <div id="historyList" class="space-y-3 text-sm"></div>
      </div>

    </div>

    <!-- Calendar Modal -->
    <div id="calendarModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-4">
          <button id="prevMonth" class="text-xl px-3">←</button>
          <h3 id="calendarTitle" class="text-xl font-semibold"></h3>
          <button id="nextMonth" class="text-xl px-3">→</button>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-sm"></div>
        
        <div class="mt-6 border-t border-zinc-700 pt-4">
          <div id="dayDetails" class="hidden">
            <div class="flex justify-between items-center mb-3">
              <div id="selectedDate" class="font-semibold"></div>
              <div id="dayTotal" class="font-mono text-emerald-400"></div>
            </div>
            <div id="dayTransactions" class="space-y-2 max-h-64 overflow-auto"></div>
          </div>
        </div>

        <button id="closeCalendar"
          class="mt-6 w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
          Close
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
