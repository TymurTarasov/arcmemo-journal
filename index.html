<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcMemoJournal • USDC Payment Journal on Arc</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#0a0a0f] text-white min-h-screen" style="font-family:'Inter',sans-serif">

    <div class="fixed inset-0 pointer-events-none overflow-hidden">
      <div class="absolute top-[-20%] left-[30%] w-[600px] h-[600px] bg-emerald-500/5 rounded-full blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[20%] w-[400px] h-[400px] bg-blue-500/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative max-w-3xl mx-auto px-5 py-8">

      <!-- Header -->
      <div class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-3">
          <img src="/logo.png" alt="ArcMemo" class="w-12 h-12 rounded-2xl">
          <div>
            <div class="flex items-center gap-2">
              <span class="text-xl font-bold tracking-tight">ArcMemo</span>
              <span class="text-xs px-2 py-0.5 bg-zinc-800 text-zinc-400 rounded-full border border-zinc-700">Testnet</span>
            </div>
            <div class="text-xs text-zinc-500 tracking-wider">Send USDC. Remember why.</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <a href="https://faucet.circle.com/" target="_blank"
            class="text-xs px-3 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 hover:text-teal-400 rounded-xl transition">
            💧 Faucet
          </a>
          <a href="https://x.com/ArcMemoJournal" target="_blank"
            class="text-xs px-3 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 hover:text-white rounded-xl transition">
            𝕏
          </a>
          <div id="balanceDisplay" class="text-sm font-mono text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-2xl"></div>
          <div id="walletStatus" class="text-sm text-zinc-400"></div>
          <button id="connectBtn" class="px-5 py-2.5 bg-white text-black text-sm font-medium rounded-2xl hover:bg-zinc-100 transition">
            Connect Wallet
          </button>
        </div>
      </div>

      <!-- Send Card -->
      <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-6 mb-5 backdrop-blur-sm">
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1.5 h-5 bg-emerald-500 rounded-full"></div>
          <h2 class="text-base font-semibold">Send USDC</h2>
        </div>
        <div class="space-y-3">
          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Recipient</label>
              <button id="chooseContactBtn" class="text-xs px-3 py-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 rounded-xl transition">
                From contacts
              </button>
            </div>
            <input id="recipient" type="text" placeholder="0x..."
              class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-4 py-2.5 text-sm outline-none transition placeholder:text-zinc-600">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1.5">Amount (USDC)</label>
              <input id="amount" type="number" value="1" step="0.01"
                class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-4 py-2.5 text-sm outline-none transition">
            </div>
            <div>
              <label class="block text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1.5">Category</label>
              <div class="flex gap-2">
                <select id="category" class="flex-1 bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-3 py-2.5 text-sm outline-none transition"></select>
                <div id="categoryColorDot" class="w-10 h-10 rounded-2xl border border-zinc-700 shrink-0" style="background:#6366f1"></div>
              </div>
            </div>
          </div>

          <!-- Your categories -->
          <div id="savedCategoriesBar" class="hidden">
            <div class="flex items-center justify-between mb-1.5">
              <label class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Your categories</label>
            </div>
            <div id="savedCategoriesList" class="flex flex-wrap gap-2 mb-2"></div>
            <div class="flex gap-2">
              <input id="newCategoryInput" type="text" placeholder="New category name..."
                class="flex-1 bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition placeholder:text-zinc-600">
              <input id="newCategoryColor" type="color" value="#6366f1"
                class="w-10 h-10 rounded-xl border border-zinc-700 bg-zinc-950 cursor-pointer p-1 shrink-0">
              <button id="addCategoryBtn" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-sm text-zinc-300 rounded-xl transition whitespace-nowrap">
                + Add
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1.5">Memo</label>
            <textarea id="memo" rows="2" placeholder="Add a note..."
              class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-4 py-2.5 text-sm outline-none transition resize-none placeholder:text-zinc-600"></textarea>
          </div>
        </div>
        <button id="sendBtn" class="mt-5 w-full bg-emerald-500 hover:bg-emerald-400 transition text-black font-semibold py-3 rounded-2xl text-sm">
          Send with Memo →
        </button>
      </div>

      <!-- Contacts + Calendar side by side -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">

        <!-- Contacts -->
        <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-5 backdrop-blur-sm">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-1.5 h-5 bg-blue-500 rounded-full"></div>
            <h2 class="text-base font-semibold">Contacts</h2>
          </div>
          <div class="space-y-2 mb-3">
            <input id="contactName" type="text" placeholder="Name"
              class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-4 py-2 text-sm outline-none transition placeholder:text-zinc-600">
            <input id="contactAddress" type="text" placeholder="0x..."
              class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-2xl px-4 py-2 text-sm outline-none transition placeholder:text-zinc-600">
            <button id="addContactBtn" class="w-full py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-sm text-zinc-200 rounded-2xl transition">
              + Add Contact
            </button>
          </div>
          <div id="contactsList" class="space-y-1.5 max-h-52 overflow-y-auto"></div>
        </div>

        <!-- Calendar -->
        <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-5 backdrop-blur-sm">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <div class="w-1.5 h-5 bg-emerald-400 rounded-full"></div>
              <h2 class="text-base font-semibold" id="calendarTitle"></h2>
            </div>
            <div class="flex gap-1">
              <button id="prevMonth" class="w-7 h-7 flex items-center justify-center hover:bg-zinc-800 rounded-lg transition text-zinc-400 text-sm">←</button>
              <button id="nextMonth" class="w-7 h-7 flex items-center justify-center hover:bg-zinc-800 rounded-lg transition text-zinc-400 text-sm">→</button>
              <button id="calendarBtn" class="w-7 h-7 flex items-center justify-center hover:bg-zinc-800 rounded-lg transition text-zinc-400 text-sm" title="Expand">⤢</button>
            </div>
          </div>
          <!-- Legend -->
          <div class="flex gap-3 mb-2 flex-wrap">
            <span class="flex items-center gap-1 text-xs text-zinc-500"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block"></span>Tx</span>
            <span class="flex items-center gap-1 text-xs text-zinc-500"><span class="w-1.5 h-1.5 rounded-full bg-violet-500 inline-block"></span>Sched</span>
            <span class="flex items-center gap-1 text-xs text-zinc-500"><span class="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block"></span>Note</span>
            <span class="flex items-center gap-1 text-xs text-zinc-500"><span class="w-1.5 h-1.5 rounded-full bg-orange-400 inline-block"></span>Event</span>
          </div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-0.5 text-center text-xs"></div>
          <!-- Mini day detail -->
          <div id="miniDayDetail" class="hidden mt-3 pt-3 border-t border-zinc-800">
            <div class="flex justify-between items-center mb-2">
              <span id="miniSelectedDate" class="text-xs font-semibold text-zinc-300"></span>
              <span id="miniDayTotal" class="text-xs font-mono text-emerald-400"></span>
            </div>
            <div id="miniDayContent" class="space-y-1 max-h-28 overflow-y-auto mb-2"></div>
            <!-- Quick add -->
            <div class="flex gap-1.5">
              <input id="miniEventTitle" type="text" placeholder="Add note or event..."
                class="flex-1 bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-1.5 text-xs outline-none transition placeholder:text-zinc-600">
              <select id="miniEventType" class="bg-zinc-950/80 border border-zinc-800 rounded-xl px-2 py-1.5 text-xs outline-none">
                <option value="note">📝</option>
                <option value="event">🎯</option>
                <option value="holiday">🎉</option>
              </select>
              <button id="miniSaveEventBtn" class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-xs rounded-xl transition">+</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Scheduled Payments -->
      <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-5 mb-5 backdrop-blur-sm">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-5 bg-violet-500 rounded-full"></div>
            <h2 class="text-base font-semibold">Scheduled Payments</h2>
          </div>
          <button id="toggleScheduleForm" class="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 rounded-xl transition">+ Schedule</button>
        </div>
        <div id="scheduleForm" class="hidden mb-4 p-4 bg-zinc-800/40 border border-zinc-700/50 rounded-2xl space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-zinc-500 uppercase tracking-wider block mb-1">Recipient</label>
              <input id="schedRecipient" type="text" placeholder="0x..."
                class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition placeholder:text-zinc-600">
            </div>
            <div>
              <label class="text-xs text-zinc-500 uppercase tracking-wider block mb-1">Amount (USDC)</label>
              <input id="schedAmount" type="number" value="1" step="0.01"
                class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-zinc-500 uppercase tracking-wider block mb-1">Date and Time</label>
              <input id="schedDateTime" type="datetime-local"
                class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition">
            </div>
            <div>
              <label class="text-xs text-zinc-500 uppercase tracking-wider block mb-1">Repeat</label>
              <select id="schedRepeat" class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition">
                <option value="once">One time</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
          </div>
          <div>
            <label class="text-xs text-zinc-500 uppercase tracking-wider block mb-1">Memo</label>
            <input id="schedMemo" type="text" placeholder="e.g. Monthly rent..."
              class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition placeholder:text-zinc-600">
          </div>
          <div class="flex gap-2">
            <button id="saveScheduleBtn" class="flex-1 py-2 bg-violet-500/20 hover:bg-violet-500/30 border border-violet-500/30 text-violet-300 text-sm font-medium rounded-xl transition">Save Schedule</button>
            <button id="cancelScheduleBtn" class="px-4 py-2 bg-zinc-700/50 hover:bg-zinc-700 text-zinc-400 text-sm rounded-xl transition">Cancel</button>
          </div>
        </div>
        <div id="scheduledList"><div class="text-center py-6 text-zinc-600 text-xs">No scheduled payments</div></div>
      </div>

      <!-- History -->
      <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-5 mb-8 backdrop-blur-sm">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-5 bg-orange-500 rounded-full"></div>
            <h2 class="text-base font-semibold">History</h2>
          </div>
          <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Search..."
              class="bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-1.5 text-xs outline-none transition w-32 placeholder:text-zinc-600">
            <button id="exportBtn" class="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-xl text-zinc-400 transition">Export</button>
            <button id="clearHistoryBtn" class="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-xl text-zinc-500 transition">Clear</button>
          </div>
        </div>
        <div id="historyList" class="space-y-1.5"></div>
      </div>

      <!-- Footer -->
      <footer class="border-t border-zinc-800/60 pt-5">
        <div class="flex flex-wrap items-center justify-center gap-5 text-xs text-zinc-600">
          <a href="https://faucet.circle.com/" target="_blank" class="hover:text-zinc-300 transition flex items-center gap-1">💧 Faucet</a>
          <a href="https://testnet.arcscan.app/" target="_blank" class="hover:text-zinc-300 transition flex items-center gap-1">🔍 Explorer</a>
          <a href="https://docs.arc.io/" target="_blank" class="hover:text-zinc-300 transition flex items-center gap-1">📄 Arc Docs</a>
          <a href="https://x.com/ArcMemoJournal" target="_blank" class="hover:text-zinc-300 transition flex items-center gap-1">𝕏 @ArcMemoJournal</a>
        </div>
        <div class="text-center text-xs text-zinc-700 mt-3">ArcMemoJournal · Built on Arc Testnet · 2025</div>
      </footer>
    </div>

    <!-- Calendar Full Modal -->
    <div id="calendarModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div class="bg-zinc-900 border border-zinc-700/80 rounded-3xl w-full max-w-lg">
        <div class="flex justify-between items-center p-5 border-b border-zinc-800">
          <button id="modalPrevMonth" class="w-8 h-8 flex items-center justify-center hover:bg-zinc-800 rounded-xl transition text-zinc-400">←</button>
          <h3 id="modalCalendarTitle" class="text-sm font-semibold"></h3>
          <button id="modalNextMonth" class="w-8 h-8 flex items-center justify-center hover:bg-zinc-800 rounded-xl transition text-zinc-400">→</button>
        </div>
        <div class="p-5">
          <div class="flex gap-4 mb-3 text-xs text-zinc-500 flex-wrap">
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span>Transaction</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-violet-500 inline-block"></span>Scheduled</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-400 inline-block"></span>Note</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-400 inline-block"></span>Event</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-pink-400 inline-block"></span>Holiday</span>
          </div>
          <div id="modalCalendarGrid" class="grid grid-cols-7 gap-1 text-center text-xs mb-4"></div>
          <div id="modalDayDetails" class="hidden border-t border-zinc-800 pt-4">
            <div class="flex justify-between items-center mb-2">
              <div id="modalSelectedDate" class="text-sm font-semibold"></div>
              <div id="modalDayTotal" class="font-mono text-emerald-400 text-sm"></div>
            </div>
            <div id="modalDayContent" class="space-y-1.5 max-h-40 overflow-auto mb-3"></div>
            <div class="bg-zinc-800/40 border border-zinc-700/50 rounded-2xl p-3 space-y-2">
              <div class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Add to this day</div>
              <input id="modalEventTitle" type="text" placeholder="Title..."
                class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-sm outline-none transition placeholder:text-zinc-600">
              <div class="flex gap-2">
                <select id="modalEventType" class="flex-1 bg-zinc-950/80 border border-zinc-800 rounded-xl px-3 py-2 text-xs outline-none">
                  <option value="note">📝 Note</option>
                  <option value="event">🎯 Event</option>
                  <option value="holiday">🎉 Holiday</option>
                  <option value="payment">💸 Schedule Payment</option>
                </select>
                <input id="modalEventColor" type="color" value="#6366f1"
                  class="w-10 h-9 rounded-xl border border-zinc-700 bg-zinc-950 cursor-pointer p-1">
                <button id="modalSaveEventBtn" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-xs rounded-xl transition">Save</button>
              </div>
              <div id="modalPaymentFields" class="hidden grid grid-cols-2 gap-2">
                <input id="modalPayRecipient" type="text" placeholder="Recipient 0x..."
                  class="bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-xs outline-none transition placeholder:text-zinc-600">
                <input id="modalPayAmount" type="number" value="1"
                  class="bg-zinc-950/80 border border-zinc-800 focus:border-zinc-600 rounded-xl px-3 py-2 text-xs outline-none transition">
              </div>
            </div>
          </div>
        </div>
        <div class="px-5 pb-5">
          <button id="closeCalendar" class="w-full py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm text-zinc-300 transition">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
